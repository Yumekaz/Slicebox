<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Your box is ready — slicebox</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="screen" style="padding-top:0">

  <div class="top-bar">
    <a href="index.html" class="logo logo-sm">Slicebox</a>
  </div>

  <p class="page-heading">Your box is ready</p>

  <div class="share-wrap">

    <p style="font-size:15px;color:var(--ink);margin-bottom:24px;font-style:italic;line-height:1.6">
      Hi, I made this box for you!
    </p>

    <!-- Mini arrangement preview -->
    <div id="preview-arrange" style="display:flex;justify-content:center;margin-bottom:28px"></div>

    <!-- Hidden URL for copy/share -->
    <div id="share-url" style="display:none">Generating link…</div>

    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:10px">
      <button class="btn btn-dark" onclick="copyLink()">Copy Link</button>
      <button class="btn btn-outline" onclick="shareLink()">Share</button>
    </div>
    <div class="copy-confirm" id="copy-confirm"></div>

    <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border)">
      <a href="index.html" class="btn btn-outline" style="width:100%">Send Another</a>
    </div>

  </div>

</div>
<script src="js/state.js"></script>
<script src="js/data.js"></script>
<script src="js/share.js"></script>
</body>
</html>
