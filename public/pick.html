<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pick your slices — slicebox</title>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="screen" style="padding-top:0;padding-bottom:140px">

  <div class="top-bar">
    <a href="index.html" class="logo logo-sm">Slicebox</a>
  </div>

  <p class="page-heading" id="pick-heading">Pick 6 to 10 slices</p>

  <div class="cake-grid" id="cake-grid"></div>

</div>

<!-- Fixed bottom pills bar -->
<div class="pills-bar" id="pills-bar" style="flex-direction:column;gap:14px;padding:18px 20px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center">
    <span class="pills-count" id="pills-count">0 / 10</span>
    <div id="pills-list" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center"></div>
  </div>
  <a href="arrange.html" class="btn btn-dark btn-disabled" id="next-btn" style="padding:14px 40px;font-size:13px;white-space:nowrap">Next</a>
</div>

<script src="js/state.js"></script>
<script src="js/data.js"></script>
<script src="js/pick.js"></script>
</body>
</html>
